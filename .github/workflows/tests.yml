name: Tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          # Variables de entorno mínimas para que los módulos importen correctamente.
          # Los tests mockean toda la capa de Supabase y Garmin — no se realizan
          # conexiones reales en ningún test.
          SUPABASE_URL: "https://xxx.supabase.co"
          SUPABASE_ANON_KEY: "test-anon-key-for-ci"
          ENCRYPTION_KEY: "dGVzdF9rZXlfdGVzdF9rZXlfdGVzdF9rZXlfdGVzdCE="
          GARMIN_EMAIL: "ci@test.local"
          GARMIN_PASSWORD: "ci-test-password"
        run: |
          pytest --tb=short -q
